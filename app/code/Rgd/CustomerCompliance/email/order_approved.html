<!--@subject Your Order Has Been Approved @-->
<!--@vars {"var customer_name":"Customer Name", "var order_increment_id":"Order Increment Id"} @-->

<table cellspacing="0" cellpadding="0" border="0" width="100%" style="width:100%; background-color:#ffffff;">
    <tr>
        <td style="padding:20px 30px; font-family:Arial, Helvetica, sans-serif; font-size:14px; line-height:1.6; color:#333333;">
            <p style="margin:0 0 16px 0;">Dear {{var customer_name}},</p>

            <p style="margin:0 0 16px 0;">
                Your order #{{var order_increment_id}} has been reviewed and approved. It will now proceed to
                fulfillment.
            </p>

            <p style="margin:0 0 16px 0;">
                You will receive a separate notification once your order has shipped.
            </p>

            <p style="margin:24px 0 0 0;">Thank you,<br />Customer Service</p>
        </td>
    </tr>
</table>
