# Workflow manifest for rgd_dental's agent pipeline.
#
# Ported structure from em-claude-skills (jeffallan/claude-skills,
# commands/workflow-manifest.yaml) onto this project's existing
# CEO -> Eng -> Design -> Build -> Testing -> Review -> Ship pipeline
# (see .claude/workflows/orchestrator.md for the prose version).
#
# This file is the machine-readable source of truth for:
#   - which phase depends on which (depends_on)
#   - whether that dependency is a hard block or advisory (strength)
#   - which phases can be skipped for a given flow_type (optional)
#   - which phases must never re-run mid-task (run_once)
#   - external prerequisites a phase requires before it may start
#   - loopback/escalation behavior on gate failure
#
# orchestrator.md remains the authoritative prose description for a human
# or agent reading top-to-bottom; this manifest is for anything that needs
# to reason about the dependency graph programmatically (e.g. "can Design
# start yet?", "is this phase optional for hotfix?").

version: "1.0"

classifier:
  description: .claude/agents/classifier.md
  run_once: true
  optional: false
  outputs: [task_size, branch_name]
  note: >
    Runs first on every task, ~50 tokens. Emits task_size (nano|standard|full),
    which selects a lean_tier below instead of the full phase graph.

phases:
  ceo:
    description: .claude/agents/ceo.md
    depends_on: []
    run_once: true
    optional: false
    gate:
      command: /plan-ceo-review
      strength: required
      exception: "hotfix flow_type — self-approved; gate strength effectively recommended, not required"
    applies_to_flows: [backend-feature, frontend-feature, hotfix, design-only, security-patch]

  eng:
    description: .claude/agents/eng.md
    depends_on:
      - phase: ceo
        strength: required
    optional: true
    optional_reason: "skipped entirely for hotfix and design-only flows"
    gate:
      command: /plan-eng-review
      strength: required
    applies_to_flows: [backend-feature, frontend-feature, security-patch]

  design:
    description: .claude/agents/design.md
    depends_on:
      - phase: ceo
        strength: required
      - phase: eng
        strength: recommended
        note: "frontend-feature runs design after eng; design-only has no eng phase at all, so it depends only on ceo"
    optional: true
    optional_reason: "skipped for backend-feature, hotfix, security-patch"
    gate:
      command: /plan-design-review
      strength: required
    applies_to_flows: [frontend-feature, design-only]

  build:
    description: .claude/agents/build.md
    depends_on:
      - phase: ceo
        strength: required
      - phase: eng
        strength: recommended
        note: "required when eng ran for this flow_type; hotfix has no eng, so build depends on ceo directly"
      - phase: design
        strength: recommended
        note: "required when design ran (frontend-feature); most flows have no design phase"
    optional: false
    gate:
      command: code-review (self-review)
      strength: required
    applies_to_flows: [backend-feature, frontend-feature, hotfix, security-patch]

  testing:
    description: .claude/agents/testing.md
    depends_on:
      - phase: build
        strength: required
    optional: false
    optional_reason: "skipped only for design-only (no code is built)"
    external_prerequisites:
      - skill: security-guidance
        role: prerequisite
        condition: "flow_type == security-patch"
        strength: required
    gate:
      condition: "all tests green; security-guidance clean when applicable"
      strength: required
    loopback:
      target: build
      condition: "any test fails, or security-guidance flags a partial fix"
      max_cycles: 3
      escalate_after:
        phase: ceo
        reason: "4th cycle — scope reassessment, not another retry"
    applies_to_flows: [backend-feature, frontend-feature, hotfix, security-patch]

  review:
    description: .claude/agents/review.md
    depends_on:
      - phase: testing
        strength: required
        note: "for design-only, testing is skipped, so review depends on design instead — see next entry"
      - phase: design
        strength: recommended
        note: "satisfies design-only's direct ceo -> design -> review path"
    optional: false
    run_once: false
    external_prerequisites:
      - skill: security-guidance
        role: mandatory
        condition: always
    gate:
      condition: "zero BLOCKER findings from code-review + security-guidance"
      strength: required
    loopback:
      - target: build
        condition: "any BLOCKER finding"
        max_cycles: 3
        escalate_after: { phase: ceo }
      - target: eng
        condition: "spec compliance failure"
        max_cycles: 3
        escalate_after: { phase: ceo }
    applies_to_flows: [backend-feature, frontend-feature, hotfix, design-only, security-patch]

  ship:
    description: .claude/agents/ship.md
    depends_on:
      - phase: review
        strength: required
    optional: false
    run_once: true
    gate:
      condition: "commit message contains 'Reviewed-by: review-agent' AND branch is pushed"
      strength: required
      hard_stop: true
      note: "if precondition unmet, Ship does not activate — no partial execution"
    applies_to_flows: [backend-feature, frontend-feature, hotfix, design-only, security-patch]

# Lean tiers bypass the phase graph above almost entirely. Modeled on
# em-claude-skills' phase `optional`/skip pattern rather than depends_on,
# since these are flat two-step pipelines, not graphs.
lean_tiers:
  nano:
    source: .claude/workflows/pipeline-nano.md
    phases: [build_lean, review_lean]
    skips: [ceo, eng, design, testing, ship]
    escalation: "Build may emit <escalate>standard</escalate>; classifier re-runs and reloads the standard tier"
  standard:
    source: .claude/workflows/pipeline-standard.md
    phases: [ceo_lean, build, review, ship_lean]
    skips: [eng, design, testing]
    escalation: "Build may emit <escalate>full</escalate>; classifier re-runs and reloads the full phase graph"

# Cross-flow gate/commit safety rule, ported here for machine-readability
# (prose version lives in orchestrator.md section 5).
commit_gate:
  rule: "git commit / git push / git merge may only appear in review or ship phase output"
  violation: "any other phase emitting these commands is an orchestrator error — stop and flag"
